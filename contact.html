<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact page for Igole Lazarus">
  <title>Contact</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Igole Lazarus</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">HOME</a></li>
          <li class="nav-item"><a class="nav-link" href="aboutme.html">ABOUT ME</a></li>
          <li class="nav-item"><a class="nav-link" href="experience.html">EXPERIENCE</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="contact.html">CONTACT</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <h1 class="display-6 fw-bold mb-3">Get in Touch</h1>
        <p class="lead text-muted mb-4">Have a question or want to work together? Send a message and I will reply soon.</p>
        <form>
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" placeholder="Your name">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com">
          </div>
          <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea class="form-control" id="message" rows="5" placeholder="Write your message..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="bg-primary text-white text-center py-4">
    <p class="mb-2">&copy; 2026 Igole Lazarus. All rights reserved.</p>
    <div class="d-flex justify-content-center flex-wrap gap-2">
      <a href="#" class="social-icon facebook" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
      <a href="#" class="social-icon twitter" aria-label="Twitter"><i class="bi bi-twitter-x"></i></a>
      <a href="#" class="social-icon instagram" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
      <a href="#" class="social-icon linkedin" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
